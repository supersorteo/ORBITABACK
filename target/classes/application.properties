spring.application.name=orbita

# Servidor
server.port=8080

# Base de datos MySQL (desarrollo local)
#spring.datasource.url=jdbc:mysql://localhost:3306/ORBITA?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.url=jdbc:mysql://localhost:3306/ORBITA?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires

spring.datasource.username=root
spring.datasource.password=Tanque.123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# CORS - orígenes permitidos (separados por coma)
cors.allowed-origins=http://localhost:4200

spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}