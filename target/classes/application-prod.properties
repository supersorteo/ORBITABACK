spring.application.name=orbita
server.port=${PORT:8080}
  
# Base de datos MySQL (Railway - variables de entorno)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true
spring.datasource.hikari.data-source-properties.useSSL=false
spring.datasource.hikari.data-source-properties.serverTimezone=UTC

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS - dominio de Firebase Hosting en producción
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://orbitafront.web.app,https://orbita-software.web.app,https://orbita.software}
